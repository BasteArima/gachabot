services:
  db:
    image: postgres:15-alpine
    container_name: gachabot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  # НОВЫЙ СЕРВИС REDIS
  redis:
    image: redis:7-alpine
    container_name: gachabot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  bot:
    build: .
    container_name: gachabot_app
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - POSTGRES_HOST=db         # <--- ИСПРАВЛЕНО ЗДЕСЬ
      - POSTGRES_PORT=5432       # <--- ИСПРАВЛЕНО ЗДЕСЬ
      - POSTGRES_USER=${POSTGRES_USER}       # <--- ИСПРАВЛЕНО ЗДЕСЬ
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD} # <--- ИСПРАВЛЕНО ЗДЕСЬ
      - POSTGRES_DB=${POSTGRES_DB}           # <--- ИСПРАВЛЕНО ЗДЕСЬ
      - REDIS_ADDR=redis:6379

volumes:
  postgres_data:
  redis_data: # НОВЫЙ VOLUME ДЛЯ REDIS