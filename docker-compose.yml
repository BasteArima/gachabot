services:
  bot:
    build: .
    container_name: gachabot_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    container_name: gachabot_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # ВОТ ЭТА СТРОЧКА! Она заставит БД создать таблицы при первом запуске:
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata: