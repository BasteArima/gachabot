services:
  db:
    image: postgres:15-alpine
    container_name: gachabot_db
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    container_name: gachabot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  bot:
    build:
      context: .
      args:
        VITE_TG_BOT_USERNAME: ${VITE_TG_BOT_USERNAME}
        VITE_DISCORD_CLIENT_ID: ${VITE_DISCORD_CLIENT_ID}
    container_name: gachabot_app
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      - TZ=Europe/Moscow
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - ADMIN_DISCORD_ID=${ADMIN_DISCORD_ID}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_OAUTH_REDIRECT=${DISCORD_OAUTH_REDIRECT}
      - HTTP_PORT=8080
      # HTTP_STATIC_DIR is baked into the image (/root/web) by the Dockerfile.
      - WEB_APP_URL=${WEB_APP_URL}
      - DEV_ALLOW_NO_AUTH=${DEV_ALLOW_NO_AUTH}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_ADDR=redis:6379
      - REQUIRE_18_PLUS_CONFIRM=${REQUIRE_18_PLUS_CONFIRM}
      - COOLDOWN_HOURS=${COOLDOWN_HOURS}
      - ENABLE_DUPLICATES=${ENABLE_DUPLICATES}
      - ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID}
      - ADMIN_TG_BACKUP_GROUP_ID=${ADMIN_TG_BACKUP_GROUP_ID}
      - ADMIN_TG_SUGGESTS_GROUP_ID=${ADMIN_TG_SUGGESTS_GROUP_ID}
      - ADD_BOT_TO_GROUP_LINK=${ADD_BOT_TO_GROUP_LINK}
      - START_BANNER_URL=${START_BANNER_URL}
      - BACKUP_TIME_HOUR=${BACKUP_TIME_HOUR}
      - BACKUP_TIME_MINUTE=${BACKUP_TIME_MINUTE}
    expose:
      - "8080"
    # If your reverse proxy runs on the host (not this compose network), publish it:
    #   ports: ["8080:8080"]
    volumes:
      - /opt/gachabot/backups:/backups:ro

  # One-shot tool to apply/export a theme. Does NOT start with `up` (profile).
  # Apply a committed theme:  docker-compose run --rm seed import /theme.json
  # Export current DB:        docker-compose run --rm seed export -
  seed:
    build: .
    profiles: ["tools"]
    depends_on:
      - db
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./theme.json:/theme.json:ro
    entrypoint: ["./seed"]
    command: ["validate", "/theme.json"]

  pgbackups:
    image: prodrigestivill/postgres-backup-local
    restart: always
    depends_on:
      - db
    volumes:
      - /opt/gachabot/backups:/backups
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=Europe/Moscow
      - SCHEDULE=0 3 * * *
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4

volumes:
  postgres_data:
  redis_data: