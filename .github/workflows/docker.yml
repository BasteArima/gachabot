name: Build & Push Image

# Builds the multi-stage image (Go + frontend submodule) and pushes it to GHCR
# on every push to main. Deployment is manual: you re-pull the image in Portainer
# when you want. No server access from CI.
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Don't keep the repo-scoped token as a git extraheader, or it would
          # override the PAT below when cloning the (private) web submodule.
          persist-credentials: false

      # Fetch ONLY the `web` submodule (the image needs the frontend; it does NOT
      # need `_content_helpers`/arts, which is excluded via .dockerignore and is a
      # large private repo). gacha-nova is private, so the default Actions token
      # can't clone it — provide a PAT with read access via the SUBMODULE_PAT secret
      # (classic PAT with `repo` scope, or fine-grained with Contents: Read on gacha-nova).
      - name: Fetch web submodule
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init web

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/bastearima/gachabot:latest
            ghcr.io/bastearima/gachabot:${{ github.sha }}
          # Frontend build-time vars (public values — client id / bot username).
          build-args: |
            VITE_TG_BOT_USERNAME=${{ secrets.VITE_TG_BOT_USERNAME }}
            VITE_DISCORD_CLIENT_ID=${{ secrets.VITE_DISCORD_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
