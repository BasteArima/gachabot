name: Build & Push Image

# Builds the multi-stage image (Go + frontend submodule) and pushes it to GHCR
# on every push to main. Deployment is manual: you re-pull the image in Portainer
# when you want. No server access from CI.
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          # `web` (gacha-nova) and `_content_helpers` are submodules. If either repo
          # is PRIVATE, create a classic PAT with repo scope and add it as the
          # secret SUBMODULE_PAT; public submodules work with the default token.
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || github.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/bastearima/gachabot:latest
            ghcr.io/bastearima/gachabot:${{ github.sha }}
          # Frontend build-time vars (public values — client id / bot username).
          build-args: |
            VITE_TG_BOT_USERNAME=${{ secrets.VITE_TG_BOT_USERNAME }}
            VITE_DISCORD_CLIENT_ID=${{ secrets.VITE_DISCORD_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
