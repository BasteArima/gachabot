name: Deploy to Home Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: contains(github.event.head_commit.message, '[build]') || contains(github.event.head_commit.message, '[deploy]')
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" >> .env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}" >> .env
          echo "POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "REQUIRE_18_PLUS_CONFIRM=${{ secrets.REQUIRE_18_PLUS_CONFIRM }}" >> .env
          echo "COOLDOWN_HOURS=${{ secrets.COOLDOWN_HOURS }}" >> .env
          echo "ADMIN_TELEGRAM_ID=${{ secrets.ADMIN_TELEGRAM_ID }}" >> .env
          echo "ADMIN_TG_BACKUP_GROUP_ID=${{ secrets.ADMIN_TG_BACKUP_GROUP_ID }}" >> .env
          echo "ADMIN_TG_SUGGESTS_GROUP_ID=${{ secrets.ADMIN_TG_SUGGESTS_GROUP_ID }}" >> .env
          echo "BOT_GROUP_LINK=${{ secrets.BOT_GROUP_LINK }}" >> .env
          echo "START_BANNER_URL=${{ secrets.START_BANNER_URL }}" >> .env
          echo "BACKUP_TIME_HOUR=${{ secrets.BACKUP_TIME_HOUR }}" >> .env
          echo "BACKUP_TIME_MINUTE=${{ secrets.BACKUP_TIME_MINUTE }}" >> .env
          

      - name: Deploy with Docker Compose
        run: |
          docker-compose down
          docker-compose up -d --build
          docker image prune -f