# Production stack for Portainer (Web editor): pulls the prebuilt image from GHCR
# instead of building. Paste this into Portainer → Stacks → Add stack, then fill
# the environment variables in the UI.
#
# DB SAFETY: postgres_data is declared `external` and bound to the EXISTING volume
# `gachabot_postgres_data` so your current database is reused as-is. Verify the
# real name first with `docker volume ls` and adjust if different. See docs/deploy.md.
#
# PREREQUISITE: the shared `proxy` network must exist and Nginx Proxy Manager must
# be attached to it (see the networks block at the bottom):
#   docker network create proxy
services:
  db:
    image: postgres:15-alpine
    container_name: gachabot_db
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NOTE: no schema.sql initdb mount here. The existing volume is already
    # initialised; the app runs incremental migrations on startup. For a brand-new
    # empty DB you'd need to apply schema.sql once manually (see docs/deploy.md).

  redis:
    image: redis:7-alpine
    container_name: gachabot_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  bot:
    image: ghcr.io/bastearima/gachabot:latest
    container_name: gachabot_app
    restart: unless-stopped
    networks:
      - default
      - proxy
    depends_on:
      - db
      - redis
    environment:
      - TZ=Europe/Moscow
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - ADMIN_DISCORD_ID=${ADMIN_DISCORD_ID}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_OAUTH_REDIRECT=${DISCORD_OAUTH_REDIRECT}
      - HTTP_PORT=8080
      - WEB_APP_URL=${WEB_APP_URL}
      - DEV_ALLOW_NO_AUTH=false
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_ADDR=redis:6379
      - REQUIRE_18_PLUS_CONFIRM=${REQUIRE_18_PLUS_CONFIRM}
      - COOLDOWN_HOURS=${COOLDOWN_HOURS}
      - ENABLE_DUPLICATES=${ENABLE_DUPLICATES}
      - ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID}
      - ADMIN_TG_BACKUP_GROUP_ID=${ADMIN_TG_BACKUP_GROUP_ID}
      - ADMIN_TG_SUGGESTS_GROUP_ID=${ADMIN_TG_SUGGESTS_GROUP_ID}
      - ADD_BOT_TO_GROUP_LINK=${ADD_BOT_TO_GROUP_LINK}
      - START_BANNER_URL=${START_BANNER_URL}
      - BACKUP_TIME_HOUR=${BACKUP_TIME_HOUR}
      - BACKUP_TIME_MINUTE=${BACKUP_TIME_MINUTE}
    expose:
      - "8080"
    # No host port published — Nginx Proxy Manager reaches the bot over the shared
    # `proxy` network by container name. In NPM set: Scheme http, Forward Hostname
    # gachabot_app, Forward Port 8080.
    volumes:
      - /opt/gachabot/backups:/backups:ro

  pgbackups:
    image: prodrigestivill/postgres-backup-local
    restart: always
    depends_on:
      - db
    volumes:
      - /opt/gachabot/backups:/backups
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=Europe/Moscow
      - SCHEDULE=0 3 * * *
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4

volumes:
  postgres_data:
    external: true
    name: gachabot_postgres_data
  redis_data:

networks:
  # Default network for this stack (db / redis / bot talk to each other here).
  default:
  # Shared external network with Nginx Proxy Manager. Create it once on the host:
  #   docker network create proxy
  # and attach NPM to it too (add `proxy` to NPM's networks). Then NPM forwards to
  # gachabot_app:8080 without publishing any host port.
  proxy:
    external: true
    name: proxy
